<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="40" y1="28" x2="214" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13161B"/>
      <stop offset="0.55" stop-color="#0C0F14"/>
      <stop offset="1" stop-color="#080A0E"/>
    </linearGradient>
    <linearGradient id="border" x1="32" y1="24" x2="236" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F46E5" stop-opacity="0.8"/>
      <stop offset="0.45" stop-color="#0DCCF2" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(128 128) rotate(90) scale(90)">
      <stop offset="0" stop-color="#0DCCF2" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#4F46E5" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#0C0E12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="linkA" x1="84" y1="86" x2="166" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5EE6FF"/>
      <stop offset="0.48" stop-color="#0DCCF2"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="linkB" x1="92" y1="92" x2="188" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C73FF"/>
